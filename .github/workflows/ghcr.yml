name: Build and Push to GHCR

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Only run for closed/merged main PRs OR push to dev
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to push back to main

      - name: Lowercase IMAGE_NAME
        id: lowercase_image
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Calculate New Version
        id: versioning
        run: |
          CURRENT_VER=$(cat VERSION)
          BUMP_TYPE="patch"
          TAG_SUFFIX=""
          IS_RELEASE="false"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
            if [[ "$SOURCE_BRANCH" == release/* ]]; then
              BUMP_TYPE="major"
            elif [[ "$SOURCE_BRANCH" == feature/* ]]; then
              BUMP_TYPE="minor"
            fi
            IS_RELEASE="true"
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            # For dev branch, we might not always want to bump the file in the same way, 
            # but user wants it to work similarly.
            TAG_SUFFIX="-dev"
            # We bump patch for dev by default
            BUMP_TYPE="patch"
          fi

          NEW_VER=$(python3 scripts/bump_version.py "$CURRENT_VER" "$BUMP_TYPE")
          echo "NEW_VERSION=${NEW_VER}" >> $GITHUB_OUTPUT
          echo "DOCKER_TAG=${NEW_VER}${TAG_SUFFIX}" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        # Only update the repository file for merges to main
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          echo "${{ steps.versioning.outputs.NEW_VERSION }}" > VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "Bump version to ${{ steps.versioning.outputs.NEW_VERSION }} [skip ci]"
          git push origin main

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase_image.outputs.IMAGE_NAME_LOWER }}:${{ steps.versioning.outputs.DOCKER_TAG }}
            ${{ (github.ref_name == 'main' || github.event.pull_request.base.ref == 'main') && format('{0}/{1}:latest', env.REGISTRY, steps.lowercase_image.outputs.IMAGE_NAME_LOWER) || '' }}
          labels: |
            org.opencontainers.image.version=${{ steps.versioning.outputs.DOCKER_TAG }}
