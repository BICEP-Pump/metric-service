name: Build and Push to GHCR

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Only run for closed/merged main PRs OR push to dev
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to read branch history and push VERSION updates

      - name: Lowercase IMAGE_NAME
        id: lowercase_image
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Calculate New Version
        id: versioning
        shell: bash
        run: |
          set -euo pipefail

          normalize_version() {
            local version="${1%%-*}"
            IFS='.' read -r -a parts <<< "$version"

            while [[ "${#parts[@]}" -lt 3 ]]; do
              parts+=(0)
            done

            printf '%s.%s.%s\n' "${parts[0]}" "${parts[1]}" "${parts[2]}"
          }

          bump_version() {
            local current="$1"
            local part="$2"
            local normalized
            local major
            local minor
            local patch

            normalized="$(normalize_version "$current")"
            IFS='.' read -r major minor patch <<< "$normalized"

            case "$part" in
              major)
                ((major += 1))
                minor=0
                patch=0
                ;;
              minor)
                ((minor += 1))
                patch=0
                ;;
              patch)
                ((patch += 1))
                ;;
              *)
                echo "Unsupported bump type: $part" >&2
                exit 1
                ;;
            esac

            printf '%s.%s.%s\n' "$major" "$minor" "$patch"
          }

          read_version() {
            tr -d '[:space:]' < "$1"
          }

          read_version_from_ref() {
            local ref="$1"
            git show "${ref}:VERSION" | tr -d '[:space:]'
          }

          CURRENT_VER="$(read_version VERSION)"
          NEW_VER="$CURRENT_VER"
          DOCKER_TAG="$CURRENT_VER"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
            SOURCE_SHA="${{ github.event.pull_request.head.sha }}"
            BUMP_TYPE="patch"

            if [[ "$SOURCE_BRANCH" == "dev" ]]; then
              if git cat-file -e "${SOURCE_SHA}:VERSION" 2>/dev/null; then
                NEW_VER="$(read_version_from_ref "$SOURCE_SHA")"
              fi
            else
              if [[ "$SOURCE_BRANCH" == release/* ]]; then
                BUMP_TYPE="major"
              elif [[ "$SOURCE_BRANCH" == feature/* ]]; then
                BUMP_TYPE="minor"
              fi

              NEW_VER="$(bump_version "$CURRENT_VER" "$BUMP_TYPE")"
            fi

            DOCKER_TAG="$NEW_VER"
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            NEW_VER="$(bump_version "$CURRENT_VER" "patch")"
            DOCKER_TAG="${NEW_VER}-dev"
          else
            NEW_VER="$(bump_version "$CURRENT_VER" "patch")"
            DOCKER_TAG="$NEW_VER"
          fi

          echo "NEW_VERSION=${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "DOCKER_TAG=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"

      - name: Apply VERSION file
        shell: bash
        run: |
          echo "${{ steps.versioning.outputs.NEW_VERSION }}" > VERSION

      - name: Commit VERSION file
        if: |
          (github.event_name == 'push' && github.ref_name == 'dev' && github.actor != 'github-actions[bot]') ||
          (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- VERSION; then
            exit 0
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "Bump version to ${{ steps.versioning.outputs.NEW_VERSION }} [skip ci]"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git push origin HEAD:main
          else
            git push origin HEAD:dev
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase_image.outputs.IMAGE_NAME_LOWER }}:${{ steps.versioning.outputs.DOCKER_TAG }}
            ${{ (github.ref_name == 'main' || github.event.pull_request.base.ref == 'main') && format('{0}/{1}:latest', env.REGISTRY, steps.lowercase_image.outputs.IMAGE_NAME_LOWER) || '' }}
          labels: |
            org.opencontainers.image.version=${{ steps.versioning.outputs.DOCKER_TAG }}
